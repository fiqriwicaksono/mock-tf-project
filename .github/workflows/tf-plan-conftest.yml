name: tf-plan

on:
  pull_request:
    paths:
      - "**/*.tf"
      - ".github/workflows/tf-plan.yml"
      - "policies/*.rego"

permissions:
  contents: read
  pull-requests: write

jobs:
  plan:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        envdir: [ "envs/staging", "envs/staging-vm" ]  # run both envs
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v5

      - name: TFLint init & run
        run: |
          tflint --init
          tflint

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3

      - name: Terraform Init
        working-directory: ${{ matrix.envdir }}
        run: terraform init -input=false

      - name: Terraform fmt & validate
        working-directory: ${{ matrix.envdir }}
        run: |
          terraform fmt -check
          terraform validate

      - name: Terraform plan
        id: plan
        working-directory: ${{ matrix.envdir }}
        run: |
          terraform plan -no-color -out .planfile
          terraform show -no-color -json .planfile > plan.json

      - name: Comment plan on PR
        uses: borchero/terraform-plan-comment@v2
        with:
          token: ${{ github.token }}
          planfile: ${{ matrix.envdir }}/.planfile
          header: "Plan for `${{ matrix.envdir }}`"

      # -------- OPA via Conftest (policy-as-code) ----------
      - name: Install Conftest
        run: |
          curl -L -o conftest.tar.gz https://github.com/open-policy-agent/conftest/releases/download/v0.56.0/conftest_Linux_x86_64.tar.gz
          tar xzf conftest.tar.gz
          sudo mv conftest /usr/local/bin/conftest
          conftest --version

      - name: Policy check (OPA via Conftest)
        run: |
          # Evaluate Rego policies against Terraform plan JSON
          # --input terraform tells Conftest to parse TF plan structure
          conftest test --policy ./policies --input terraform ${{ matrix.envdir }}/plan.json
